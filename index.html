<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Life OS">
<link rel="manifest" href="/manifest.json">
<title>Life OS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="logo">Life OS</span>
    <div class="topbar-r">
      <span class="topdate" id="td"></span>
      <button class="mode-pill m-off" id="mp" onclick="toggleMode()">OFF</button>
    </div>
  </div>
  <div id="main"><p class="empty">Cargando...</p></div>
  <nav id="nav">
    <button class="nb on" id="nb-home" onclick="go('home')"><i class="ti ti-home"></i>Inicio</button>
    <button class="nb" id="nb-areas" onclick="go('areas')"><i class="ti ti-layout-grid"></i>Dominios</button>
    <button class="nb" id="nb-avanzar" onclick="go('avanzar')"><i class="ti ti-bolt"></i>Avanzar</button>
    <button class="nb" id="nb-isabel" onclick="openChat()"><i class="ti ti-robot"></i>Isabel</button>
  </nav>
  <button class="fab" onclick="openAdd()"><i class="ti ti-plus"></i></button>
  <button class="fab-chat" onclick="openChat()"><i class="ti ti-message-circle"></i></button>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
